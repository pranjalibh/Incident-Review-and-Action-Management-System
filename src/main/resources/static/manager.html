<!DOCTYPE html>
<html>
<head>
  <title>Manager Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="d-flex justify-content-between">
    <h3>Manage Incidents</h3>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>

  <hr>

  <table class="table table-bordered table-striped">

    <thead>
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>Severity</th>
      <th>Status</th>
      <th>Blameless</th>
      <th>Action</th>
    </tr>
    </thead>

    <tbody id="incidentTableBody"></tbody>

  </table>

</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/route.js"></script>

<script>

  protectPage(["MANAGER"]);

  const token = getToken();

  function loadIncidents() {

      $.ajax({

          url: "/api/admin/incidents",
          type: "GET",

          headers: {
              "Authorization": "Bearer " + token
          },

          success: function(data) {

              let rows = "";

              data.forEach(incident => {

                  const blamelessLabel = incident.blameless
                      ? `<span class="badge bg-success">ON</span>`
                      : `<span class="badge bg-secondary">OFF</span>`;

                  rows += `
                      <tr>
                          <td>${incident.id}</td>
                          <td><a href="/incident-details.html?id=${incident.id}">
                          ${incident.title}
                          </a></td>
                          <td>${incident.severity}</td>
                          <td>${incident.status}</td>
                          <td>${blamelessLabel}</td>
                          <td>
                              <button class="btn btn-warning btn-sm"
                              onclick="toggleBlameless(${incident.id})">
                                  Toggle
                              </button>
                          </td>
                      </tr>
                  `;
              });

              $("#incidentTableBody").html(rows);
          },

          error: function(xhr) {

              if (xhr.status === 401 || xhr.status === 403) {
                alert("Session expired. Please login again.");
                logout();
              }

          }

      });

  }


  function toggleBlameless(id) {
  console.log("Toggle for incident:", id);

      $.ajax({

          url: "/api/admin/incidents/" + id + "/blameless",
          type: "PATCH",

          headers: {
              "Authorization": "Bearer " + token
          },

          success: function() {

              alert("Blameless mode updated");

              loadIncidents(); // reload table
          },

          error: function(xhr) {

              if (xhr.status === 403) {
                  alert("Only managers can toggle blameless mode");
              }

              if (xhr.status === 404) {
                  alert("Incident not found");
              }

          }

      });

  }

  loadIncidents();

</script>

</body>
</html>
