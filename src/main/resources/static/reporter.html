<!DOCTYPE html>
<html>
<head>
    <title>Reporter Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between">
        <h3>Create Incident</h3>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <hr>

    <div class="card p-4">

        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" id="title" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="description" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Severity</label>
            <select id="severity" class="form-control">
                <option value="">Select severity</option>
                <option value="LOW">LOW</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="HIGH">HIGH</option>
                <option value="CRITICAL">CRITICAL</option>
            </select>
        </div>

        <div class="form-check mb-3">
            <input type="checkbox" id="blameless" class="form-check-input">
            <label class="form-check-label">Blameless Incident</label>
        </div>

        <button class="btn btn-primary" onclick="createIncident()">Create Incident</button>

        <div class="mt-3">
            <span id="message"></span>
        </div>

    </div>

</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/route.js"></script>

<script>

    protectPage(["REPORTER"]);

    function createIncident() {

        const token = getToken();

        const data = {
            title: $("#title").val(),
            description: $("#description").val(),
            severity: $("#severity").val(),
            blameless: $("#blameless").is(":checked")
        };

        $.ajax({

            url: "/api/admin/incidents",
            type: "POST",
            headers: {
                "Authorization": "Bearer " + token
            },
            contentType: "application/json",
            data: JSON.stringify(data),

            success: function(response) {

                $("#message").html(
                    `<div class="alert alert-success">
                        Incident created successfully (ID: ${response.id})
                    </div>`
                );

                setTimeout(function(){
                    window.location.href = "/reporter.html";
                },1500);
            },

            error: function(xhr) {

                if (xhr.status === 400) {

                    $("#message").html(
                        `<div class="alert alert-danger">
                            Invalid incident details
                        </div>`
                    );

                } else if (xhr.status === 401 || xhr.status === 403) {

                    logout();

                } else {

                    $("#message").html(
                        `<div class="alert alert-danger">
                            Failed to create incident
                        </div>`
                    );
                }
            }

        });

    }

</script>

</body>
</html>
