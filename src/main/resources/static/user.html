<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
   <!-- <div class="page-header">
        <h2>My Action Items</h2>
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
    </div>-->
    <div class="page-header">

        <h2>My Action Items</h2>

        <div class="d-flex align-items-center gap-2">
            <button id="darkModeToggle" class="btn btn-outline-secondary">
                🌙
            </button>
            <button id="logoutBtn" class="btn btn-danger">
                Logout
            </button>
        </div>

    </div>

    <div class="row mb-4">

        <!-- Completion Chart -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5>Action Completion Overview</h5>

                    <div style="max-width: 300px; height: 250px; margin: auto;">
                        <canvas id="completionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- SLA Chart -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5>SLA Overview</h5>

                    <div style="max-width: 300px; height: 250px; margin: auto;">
                        <canvas id="slaChart"></canvas>
                    </div>

                    <p id="slaMessage"
                       class="text-center mt-3 text-muted"
                       style="display:none;">
                        No open action items - SLA is fully met
                    </p>
                </div>
            </div>
        </div>

    </div>

    <!-- Card Wrapper -->
    <div class="card">
        <div class="card-body">

            <table class="table table-hover" id="actionTable">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Action Item</th>
                    <th>Incident</th>
                    <th>Due Date</th>
                    <th>Status</th>
                </tr>
                </thead>

                <tbody id="actionTableBody"></tbody>

            </table>
            <nav class="mt-3">
                <ul class="pagination justify-content-center" id="pagination"></ul>
            </nav>

        </div>
    </div>

</div>

<!-- jQuery FIRST -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/auth.js"></script>
<script src="js/route.js"></script>
<script src="js/theme.js"></script>
<script src="js/user.js"></script>

</body>
</html>
