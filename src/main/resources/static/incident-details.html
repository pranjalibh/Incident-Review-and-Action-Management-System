<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Incident Details</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
   <!-- <div class="page-header">
        <button id="backBtn" class="btn btn-outline-secondary">Back</button>
        <button id="closeBtn" class="btn btn-danger">Close Incident</button>
    </div>-->
    <div class="page-header">

        <!-- LEFT -->
        <div>
            <button id="backBtn" class="btn btn-outline-secondary">Back</button>
          <!--  <h2 id="incidentTitle" class="mt-2"></h2>-->
        </div>

        <!-- RIGHT -->
        <div class="d-flex align-items-center gap-2">
            <button id="darkModeToggle" class="btn btn-outline-secondary">
                🌙
            </button>
            <button id="closeBtn" class="btn btn-danger">
                Close Incident
            </button>
        </div>

    </div>

    <!-- Incident Info -->
    <div class="card mb-4">
        <div class="card-body">
            <h3 id="incidentTitle"></h3>
            <p class="mb-0">
                <strong>Severity:</strong> <span id="severity"></span><br>
                <strong>Status:</strong> <span id="status"></span>
            </p>
        </div>
    </div>

    <!-- Timeline -->
    <div class="card mb-4">
        <div class="card-body">

            <div class="page-header">
                <h4>Timeline</h4>
                <button class="btn btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#timelineModal">
                    Add Event
                </button>
            </div>

            <div id="timelineList" class="timeline"></div>

        </div>
    </div>

    <!-- Action Items -->
    <div class="card">
        <div class="card-body">

            <div class="page-header">
                <h4>Action Items</h4>
                <button class="btn btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#actionModal">
                    Assign Action
                </button>
            </div>

            <ul class="list-group" id="actionList"></ul>

        </div>
    </div>

</div>

<!-- TIMELINE MODAL -->
<div class="modal fade" id="timelineModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add Timeline Event</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="text" id="description" class="form-control mb-3" placeholder="Event description">
                <input type="datetime-local" id="eventTime" class="form-control">
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="saveTimelineBtn" class="btn btn-success">Save</button>
            </div>

        </div>
    </div>
</div>

<!-- ACTION MODAL -->
<div class="modal fade" id="actionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Assign Action Item</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="text" id="actionDescription" class="form-control mb-3" placeholder="Action description">

                <select id="assignedUser" class="form-control mb-3">
                    <option value="">Select User</option>
                </select>

                <input type="datetime-local" id="dueDate" class="form-control">

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="saveActionBtn" class="btn btn-success">Save</button>
            </div>

        </div>
    </div>
</div>

<!-- FEEDBACK MODAL -->
<div class="modal fade" id="feedbackModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">System Message</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="modalMessage"></div>

            <div class="modal-footer">
                <button class="btn btn-primary" data-bs-dismiss="modal">OK</button>
            </div>

        </div>
    </div>
</div>

<!-- jQuery FIRST -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="js/auth.js"></script>
<script src="js/route.js"></script>
<script src="js/theme.js"></script>
<script src="js/incident-details.js"></script>

</body>
</html>
