<!DOCTYPE html>
<html>
<head>
    <title>Incident Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

<div class="container mt-5">

    <button class="btn btn-outline-secondary mb-3" onclick="goBack()">Back</button>

    <h3 id="incidentTitle"></h3>

    <p>
        <strong>Severity:</strong> <span id="severity"></span><br>
        <strong>Status:</strong> <span id="status"></span>
    </p>

    <hr>

    <h4>Timeline</h4>

    <ul class="list-group mb-3" id="timelineList"></ul>

    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#timelineModal">
        Add Timeline Event
    </button>

</div>


<!-- Modal -->
<div class="modal fade" id="timelineModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add Timeline Event</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="text"
                       id="description"
                       class="form-control mb-3"
                       placeholder="Event description">

                <input type="datetime-local"
                       id="eventTime"
                       class="form-control">

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancel
                </button>

                <button class="btn btn-success"
                        onclick="addTimeline()">
                    Save
                </button>

            </div>

        </div>
    </div>
</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/route.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>

    protectPage(["REPORTER","ADMIN","MANAGER","REVIEWER"]);

    const token = getToken();

    const params = new URLSearchParams(window.location.search);
    const incidentId = params.get("id");


    function goBack() {
        window.history.back();
    }


    /* ======================
       LOAD INCIDENT DETAILS
    ====================== */

    function loadIncident() {

        $.ajax({

            url: "/api/admin/incidents/" + incidentId,
            type: "GET",

            headers: {
                "Authorization": "Bearer " + token
            },

            success: function(incident) {

                $("#incidentTitle").text(incident.title);
                $("#severity").text(incident.severity);
                $("#status").text(incident.status);

            },

            error: function(xhr) {

                console.error("Failed to load incident", xhr);

            }

        });

    }


    /* ======================
       LOAD TIMELINE EVENTS
    ====================== */

    function loadTimeline() {

        $.ajax({

            url: "/api/incidents/" + incidentId + "/timeline",
            type: "GET",

            headers: {
                "Authorization": "Bearer " + token
            },

            success: function(data) {

                let items = "";

                data.forEach(event => {

                    items += `
                        <li class="list-group-item">
                            <strong>${event.eventTime}</strong><br>
                            ${event.description}
                        </li>
                    `;

                });

                $("#timelineList").html(items);

            },

            error: function(xhr) {

                console.error("Failed to load timeline", xhr);

            }

        });

    }


    /* ======================
       ADD TIMELINE EVENT
    ====================== */

    function addTimeline() {

        const payload = {

            description: $("#description").val(),
            eventTime: $("#eventTime").val()

        };

        $.ajax({

            url: "/api/incidents/" + incidentId + "/timeline",
            type: "POST",

            headers: {
                "Authorization": "Bearer " + token
            },

            contentType: "application/json",
            data: JSON.stringify(payload),

            success: function() {

                $("#description").val("");
                $("#eventTime").val("");

                const modal = bootstrap.Modal.getInstance(
                    document.getElementById("timelineModal")
                );

                modal.hide();

                loadTimeline();

            },

            error: function(xhr) {

                console.error("Failed to save timeline event", xhr);

            }

        });

    }


    /* ======================
       INITIAL PAGE LOAD
    ====================== */

    loadIncident();
    loadTimeline();

</script>

</body>
</html>
