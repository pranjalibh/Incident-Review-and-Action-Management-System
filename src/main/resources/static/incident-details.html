<!DOCTYPE html>
<html>
<head>
    <title>Incident Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

<div class="container mt-5">

    <button class="btn btn-outline-secondary mb-3" onclick="goBack()">Back</button>

    <h3 id="incidentTitle"></h3>

    <p>
        <strong>Severity:</strong> <span id="severity"></span><br>
        <strong>Status:</strong> <span id="status"></span>
    </p>

    <hr>

    <!-- TIMELINE -->

    <h4>Timeline</h4>

    <ul class="list-group mb-3" id="timelineList"></ul>

    <button class="btn btn-primary mb-4"
            data-bs-toggle="modal"
            data-bs-target="#timelineModal">
        Add Timeline Event
    </button>

    <hr>

    <!-- ACTION ITEMS -->

    <h4>Action Items</h4>

    <ul class="list-group mb-3" id="actionList"></ul>

    <button class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#actionModal">
        Assign Action Item
    </button>

</div>


<!-- TIMELINE MODAL -->

<div class="modal fade" id="timelineModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add Timeline Event</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="text"
                       id="description"
                       class="form-control mb-3"
                       placeholder="Event description">

                <input type="datetime-local"
                       id="eventTime"
                       class="form-control">

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancel
                </button>

                <button class="btn btn-success"
                        onclick="addTimeline()">
                    Save
                </button>

            </div>

        </div>
    </div>
</div>



<!-- ACTION MODAL -->

<div class="modal fade" id="actionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Assign Action Item</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="text"
                       id="actionDescription"
                       class="form-control mb-3"
                       placeholder="Action description">

                <select id="assignedUser"
                        class="form-control mb-3">
                    <option value="">Select User</option>
                </select>

                <input type="datetime-local"
                       id="dueDate"
                       class="form-control">

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancel
                </button>

                <button class="btn btn-success"
                        onclick="createAction()">
                    Save
                </button>

            </div>

        </div>
    </div>
</div>



<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/route.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>

    protectPage(["REPORTER","ADMIN","MANAGER","REVIEWER"]);

    const token = getToken();

    const params = new URLSearchParams(window.location.search);
    const incidentId = params.get("id");


    function goBack() {
        window.history.back();
    }



    /* ======================
       LOAD INCIDENT
    ====================== */

    function loadIncident() {

        $.ajax({

            url: "/api/admin/incidents/" + incidentId,
            type: "GET",

            headers: {
                "Authorization": "Bearer " + token
            },

            success: function(incident) {
                incidentData = incident;
                $("#incidentTitle").text(incident.title);
                $("#severity").text(incident.severity);
                $("#status").text(incident.status);

            }

        });

    }



    /* ======================
       LOAD TIMELINE
    ====================== */

    function loadTimeline() {

        $.ajax({

            url: "/api/incidents/" + incidentId + "/timeline",
            type: "GET",

            headers: {
                "Authorization": "Bearer " + token
            },

            success: function(events) {

                let items = "";

                events.forEach(event => {

                    items += `
                        <li class="list-group-item">
                            <strong>${event.eventTime}</strong><br>
                            ${event.description}
                        </li>
                    `;

                });

                $("#timelineList").html(items);

            }

        });

    }



    /* ======================
       ADD TIMELINE EVENT
    ====================== */

    function addTimeline() {

        const payload = {

            description: $("#description").val(),
            eventTime: $("#eventTime").val()

        };

        $.ajax({

            url: "/api/incidents/" + incidentId + "/timeline",
            type: "POST",

            headers: {
                "Authorization": "Bearer " + token
            },

            contentType: "application/json",
            data: JSON.stringify(payload),

            success: function() {

                loadTimeline();

                const modal = bootstrap.Modal.getInstance(
                    document.getElementById("timelineModal")
                );

                modal.hide();

            }

        });

    }



    /* ======================
       LOAD USERS
    ====================== */

    function loadUsers() {

        $.ajax({

            url: "/auth/users",
            type: "GET",

            headers: {
                "Authorization": "Bearer " + token
            },

            success: function(users) {

                let options = "<option value=''>Select User</option>";

                users.forEach(user => {

                    options += `
                        <option value="${user.username}">
                            ${user.username}
                        </option>
                    `;

                });

                $("#assignedUser").html(options);

            }

        });

    }



    /* ======================
       LOAD ACTION ITEMS
    ====================== */

    function loadActions() {

        $.ajax({

            url: "/api/incidents/" + incidentId + "/actions",
            type: "GET",

            headers: {
                "Authorization": "Bearer " + token
            },

            success: function(actions) {

                let rows = "";

                actions.forEach(action => {

                    rows += `
                        <li class="list-group-item d-flex justify-content-between">

                            <div>
                                <input type="checkbox"
                                ${action.completed ? "checked" : ""}
                                 onchange="completeAction(${action.id})">
                                ${action.description}
                                ${incidentData && !incidentData.blameless
                                ? `<small class="text-muted">(${action.assignedTo?.username || "Unassigned"})</small>`: ""}

                            </div>

                            <span class="badge bg-warning">
                                Due: ${action.dueDate}
                            </span>

                        </li>
                    `;

                });

                $("#actionList").html(rows);

            }

        });

    }



    /* ======================
       CREATE ACTION ITEM
    ====================== */

    function createAction() {

        const payload = {

            description: $("#actionDescription").val(),
            assignedTo: $("#assignedUser").val(),
            dueDate: $("#dueDate").val()

        };

        $.ajax({

            url: "/api/incidents/" + incidentId + "/actions",
            type: "POST",

            headers: {
                "Authorization": "Bearer " + token
            },

            contentType: "application/json",
            data: JSON.stringify(payload),

            success: function() {

                loadActions();

                const modal = bootstrap.Modal.getInstance(
                    document.getElementById("actionModal")
                );

                modal.hide();

            },

            error: function(xhr) {

                alert(xhr.responseText);

            }

        });

    }

    function completeAction(actionId) {

    $.ajax({

        url: "/api/incidents/actions/" + actionId + "/complete",
        type: "PUT",

        headers: {
            "Authorization": "Bearer " + token
        },

        success: function () {
            loadActions();
        },

        error: function(xhr) {
            alert(xhr.responseText);
        }

    });
}



    /* ======================
       INITIAL PAGE LOAD
    ====================== */

    loadIncident();
    loadTimeline();
    loadUsers();
    loadActions();

</script>

</body>
</html>
